services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--api.dashboard=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "8080:80"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`dashboard.localhost`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=web"

  whoami:
    image: traefik/whoami:latest
    container_name: simple-app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`app.localhost`)"
      - "traefik.http.routers.whoami.entrypoints=web"

  whoami-secure:
    image: traefik/whoami:latest
    container_name: secure-app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoamisecure.rule=Host(`secure.localhost`)"
      - "traefik.http.routers.whoamisecure.entrypoints=web"
      - "traefik.http.services.whoamisecure.loadbalancer.server.port=80"

      # username: admin
      # password: password123
      - "traefik.http.middlewares.my-auth.basicauth.users=admin:$$apr1$$vclq0TJG$$vmDNbfmxTdN9.4hULtKqI."
      - "traefik.http.routers.whoamisecure.middlewares=my-auth"
